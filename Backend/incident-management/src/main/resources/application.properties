spring.application.name=incident-management

# Configuración de conexión al contenedor Docker
spring.datasource.url=jdbc:postgresql://localhost:5433/opscore_db
spring.datasource.username=brian_dev
spring.datasource.password=opscore_pass

# Flyway ejecutará los scripts SQL que creamos antes automáticamente
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# Cambia el puerto del servidor para evitar el conflicto con el 8080
server.port=8081